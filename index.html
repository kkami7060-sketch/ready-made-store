<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>معاذ کامران ریڈی میڈ ستور - بہترین ریڈی میڈ ملبوسات</title>
    
    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts as backup -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <!-- Jameel Noori Nastaleeq CDN link -->
    <link href="https://cdn.jsdelivr.net/npm/jameel-noori@1.1.2/jameel-noori.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/urdu-fonts@1.5.10/fonts.min.css" rel="stylesheet">
    
    <style>
        body {
            /* Applying Jameel Noori font with fallback */
            font-family: 'Jameel-Noori', 'Jameel-Noori.N', 'Noto Nastaliq Urdu', 'Tajawal', sans-serif;
            line-height: 2; /* Increased line height for Nastaleeq script */
        }
    </style>

    <!-- JavaScript Loaded in Head for Slider & Cart Stability -->
    <script>
        let cart = [];

        // Simplified and completely robust show/hide toggle for cart drawer
        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('hidden');
        }

        // Auto Slider functions (using your custom uploaded photos!)
        function showSlide(index) {
            for (let i = 0; i < totalSlides; i++) {
                const slide = document.getElementById('slide-' + i);
                if (slide) {
                    if (i === index) {
                        slide.classList.remove('opacity-0');
                        slide.classList.add('opacity-100');
                    } else {
                        slide.classList.remove('opacity-100');
                        slide.classList.add('opacity-0');
                    }
                }
            }
        }

        function changeSlide(direction) {
            currentSlide = (currentSlide + direction + totalSlides) % totalSlides;
            showSlide(currentSlide);
        }

        // Start auto slide rotation every 4 seconds
        setInterval(function() {
            changeSlide(1);
        }, 4000);

        // Robust show/hide toggle for cart drawer
        function toggleCart() {
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.toggle('hidden');
        }

        function addToCart(name, price) {
            const existingItem = cart.find(item => item.name === name);
            if (existingItem) {
                existingItem.qty += 1;
            } else {
                cart.push({ name, price, qty: 1 });
            }
            updateCartUI();
            
            // Automatically open cart when item is added to provide feedback
            const drawer = document.getElementById('cart-drawer');
            drawer.classList.remove('hidden');
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cart-items');
            const cartCount = document.getElementById('cart-count');
            const cartTotal = document.getElementById('cart-total');

            const totalQty = cart.reduce((sum, item) => sum + item.qty, 0);
            cartCount.innerText = totalQty;

            if (cart.length === 0) {
                cartItemsContainer.innerHTML = '<p class="text-gray-500 text-center py-8">کارٹ خالی ہے</p>';
                cartTotal.innerText = '0 روپے';
                return;
            }

            let html = '';
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                html += `
                    <div class="flex justify-between items-center border-b pb-3">
                        <div>
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-xs text-gray-500">${item.price.toLocaleString()} روپے x ${item.qty}</p>
                        </div>
                        <div class="flex items-center gap-2">
                            <span class="font-semibold text-sm">${itemTotal.toLocaleString()} روپے</span>
                            <button onclick="removeFromCart(${index})" class="text-red-500 hover:text-red-700 text-xs font-bold">حذف کریں</button>
                        </div>
                    </div>
                `;
            });

            cartItemsContainer.innerHTML = html;
            cartTotal.innerText = total.toLocaleString() + ' روپے';
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCartUI();
        }

        function checkout() {
            if (cart.length === 0) {
                alert('آپ کا کارٹ خالی ہے!');
                return;
            }

            // WhatsApp Message Formatting
            let message = `*معاذ کامران ریڈی میڈ ستور*\n`;
            message += `--------------------------------------\n`;
            message += `السلام علیکم! میں درج ذیل کپڑوں کا آرڈر دینا چاہتا ہوں:\n\n`;
            
            let total = 0;
            cart.forEach((item, index) => {
                const itemTotal = item.price * item.qty;
                total += itemTotal;
                message += `*${index + 1}. ${item.name}*\n   قیمت: ${item.price.toLocaleString()} روپے | تعداد: ${item.qty} | کل: ${itemTotal.toLocaleString()} روپے\n\n`;
            });
            
            message += `--------------------------------------\n`;
            message += `*کل رقم (Grand Total):* ${total.toLocaleString()} روپے\n\n`;
            message += `مہربانی فرما کر میرا آرڈر کنفرم کریں اور ادائیگی کا طریقہ کار اور ڈیلیوری کی تفصیلات شیئر کریں۔ شکریہ!`;

            // Encoding the message to be URL friendly
            const encodedMessage = encodeURIComponent(message);
            
            // Sending to WhatsApp API with country code (92 for Pakistan)
            const whatsappUrl = `https://wa.me/923146408155?text=${encodedMessage}`;
            
            // Open in new tab
            window.open(whatsappUrl, '_blank');

            // Optional: Clear cart after order
            cart = [];
            updateCartUI();
            toggleCart();
        }
    </script>
</head>

        <!-- Slider Content -->
        <div class="absolute inset-0 flex items-center justify-center text-center p-4">
            <div class="max-w-2xl text-white space-y-4">
                <h1 class="text-3xl md:text-5xl font-bold leading-tight">معاذ کامران ریڈی میڈ ستور</h1>
                <p class="text-sm md:text-lg">جدید ڈیزائن اور بہترین کوالٹی کے کپڑے سے تیار کردہ ملبوسات جو آپ کی شخصیت کو چار چاند لگا دیں۔ اب گھر بیٹھے آرڈر کریں۔</p>
                <div>
                    <a href="#shop" class="bg-emerald-600 text-white px-6 py-2 md:px-8 md:py-3 rounded-lg text-sm md:text-lg font-semibold hover:bg-emerald-700 transition inline-block">مجموعہ دیکھیں</a>
                </div>

        <!-- Manual Navigation Arrows -->
        <button onclick="changeSlide(-1)" class="absolute right-4 top-1/2 -translate-y-1/2 bg-white bg-opacity-20 hover:bg-opacity-40 text-white w-8 h-10 rounded flex items-center justify-center z-10 transition">
            <i class="fa-solid fa-chevron-right text-lg"></i>
        </button>
        <button onclick="changeSlide(1)" class="absolute left-4 top-1/2
